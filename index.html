<!DOCTYPE html>
<html lang="fr">
<head>

<title>ORBIT</title>

</head>

<body>

<div class="container">

<h1>🌌 ORBIT</h1>

<p>Atlas émotionnel de composition musicale</p>

<h2>Mode</h2>

<select id="mode">

<option>Majeur</option>
<option>Dorien</option>
<option>Phrygien</option>
<option>Lydien</option>
<option>Mixolydien</option>
<option>Mineur harmonique</option>

</select>

<h2>Fondamentale</h2>

<select id="root">

<option>C</option>
<option>C#</option>
<option>D</option>
<option>Eb</option>
<option>E</option>
<option>F</option>
<option>F#</option>
<option>G</option>
<option>Ab</option>
<option>A</option>
<option>Bb</option>
<option>B</option>

</select>

<br><br>

<button onclick="generateScale()">

Générer la gamme

</button>

<div id="result"></div>

</div>

<script src="app.js"></script>
